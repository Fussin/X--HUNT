version: "2"

run:
  timeout: 5m

linters:
  default: all
  disable:
    # other disabled
    - forbidigo
    - gochecknoinits
    - funlen
    - goconst
    - gocritic
    - gocyclo
    - lll
    - nestif
    - testpackage
    - wsl
    - nlreturn
    - godox
  exclusions:
    paths:
      - web-ui/frontend # It's a JS project

linters-settings:
  govet:
    enable:
      - shadow
  gocyclo:
    min-complexity: 15
  dupl:
    threshold: 100
  goconst:
    min-len: 2
    min-occurrences: 2

issues:
  exclude-use-default: false
  max-issues-per-linter: 0
  max-same-issues: 0
