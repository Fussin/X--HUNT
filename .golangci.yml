run:
  timeout: 5m
  skip-dirs:
    - web-ui/frontend # It's a JS project

linters:
  enable-all: true
  disable:
    - exhaustivestruct
    - golint
    - interfacer
    - maligned
    - scopelint
    - forbidigo
    - gochecknoinits
    - funlen
    - gci
    - goconst
    - gocritic
    - gocyclo
    - gofumpt
    - lll
    - nestif
    - testpackage
    - wsl
    - nlreturn
    - godox

linters-settings:
  govet:
    check-shadowing: true
  gocyclo:
    min-complexity: 15
  maligned:
    suggest-new: true
  dupl:
    threshold: 100
  goconst:
    min-len: 2
    min-occurrences: 2

issues:
  exclude-use-default: false
  max-issues-per-linter: 0
  max-same-issues: 0
